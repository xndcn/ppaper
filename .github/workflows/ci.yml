name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        command: [typecheck, lint, test]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install-deps
        if: matrix.command == 'test'
      - run: npm run ${{ matrix.command }}
